<section class="card">

<h2>Workout Planner</h2>

<!-- Workout Images Row -->
<center>
<table>
<tr>

<td>
  <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438"
       alt="Squats"
       width="350">
</td>

<td>
  <img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e"
       alt="Bench Press"
       width="350">
</td>

<td>
  <img src="https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b"
       alt="Deadlift"
       width="350">
</td>

</tr>
</table>
</center>

<br>

</div>

<form id="plannerForm">

<label>Fitness Goal</label>
<select id="goal">
<option value="">Choose a goal</option>
<option value="muscle">Muscle Gain</option>
<option value="fat">Fat Loss</option>
<option value="strength">Strength</option>
</select>

<label>Experience Level</label>
<select id="level">
<option value="">Choose a level</option>
<option value="beginner">Beginner</option>
<option value="intermediate">Intermediate</option>
<option value="advanced">Advanced</option>
</select>

<label>Days Per Week</label>
<input type="number" id="days" min="1" max="6">

<button class="btn" type="submit">Plan Workout</button>

</form>

<div id="result" class="result-box"></div>

</section>

<script>

const form = document.getElementById("plannerForm")
const resultBox = document.getElementById("result")

form.addEventListener("submit", function(e) {

e.preventDefault()

const goal = document.getElementById("goal").value
const level = document.getElementById("level").value
const days = document.getElementById("days").value

if(goal === "" || level === "" || days === "") {

  resultBox.innerHTML = "<p>Please fill in all the options before continuing.</p>"
  return
}

let routine = []

if(goal == "muscle") {
  routine = ["Bench Press","Squats","Lat Pulldown","Shoulder Press","Bicep Curls"]
}
else if(goal == "fat") {
  routine = ["Treadmill","Jump Rope","Bodyweight Squats","Mountain Climbers","Plank"]
}
else if(goal == "strength") {
  routine = ["Deadlifts","Bench Press","Barbell Squats","Overhead Press","Rows"]
}

let output = "<h3>Your Workout Plan</h3>"
output += "<p>You selected <strong>" + days + " days per week</strong>.</p>"
output += "<ul>"

routine.forEach(function(exercise){
  output += "<li>" + exercise + " – 3 sets x 10 reps</li>"
})

output += "</ul>"

resultBox.innerHTML = output

})

</script>
